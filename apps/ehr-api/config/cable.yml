# config/cable.yml
# All environments use REDIS_URL environment variable.
# In development, defaults to localhost:6379/1 for ActionCable (separate from Sidekiq's /0).
# In production, uses the REDIS_URL passed via environment (required).
development:
  adapter: redis
  url: <%= ENV.fetch("ACTIONCABLE_REDIS_URL", "redis://localhost:6379/1") %>

test:
  adapter: test

production:
  adapter: redis
  url: <%= ENV.fetch("REDIS_URL") %>
  channel_prefix: ehr_api_production

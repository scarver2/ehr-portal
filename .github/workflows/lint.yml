# .github/workflows/lint.yml
name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rubocop:
    name: RuboCop
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/ehr-api

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version-file: apps/ehr-api/.ruby-version
          bundler-cache: true
          working-directory: apps/ehr-api

      - name: Run RuboCop
        run: bin/lint

  steep:
    name: Steep
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/ehr-api

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version-file: apps/ehr-api/.ruby-version
          bundler-cache: true
          working-directory: apps/ehr-api

      - name: Run Steep type check
        run: bin/typecheck

  eslint:
    name: ESLint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/ehr-portal

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint

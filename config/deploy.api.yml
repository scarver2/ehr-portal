# config/deploy.api.yml
service: ehr-api

image: ghcr.io/scarver2/ehr-api

builder:
  arch: amd64
  cache:
    type: registry
    options: mode=max

proxy:
  ssl: true
  host: api.ehr.stancarver.com
  app_port: 3000
  drain_timeout: 30
  healthcheck:
    path: /up

registry:
  server: ghcr.io
  username: scarver2
  password:
    - GITHUB_TOKEN

servers:
  web:
    - 45.76.237.124

ssh:
  user: deploy

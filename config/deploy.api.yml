# config/deploy.api.yml
service: ehr-api

image: scarver2/ehr-api

builder:
  arch: amd64
  cache:
    type: registry
    options: mode=max
  context: apps/ehr-api
  dockerfile: apps/ehr-api/Dockerfile

env:
  clear:
    SECRET_KEY_BASE: <%= ENV["SECRET_KEY_BASE"] %>
    DB_HOST: postgres
    DB_PORT: 5432
    DB_USER: ehr_api
    DB_NAME: ehr_api_production

  secret:
    - DB_PASSWORD

proxy:
  ssl: true
  host: api.ehr.stancarver.com
  app_port: 3000
  # drain_timeout: 30
  healthcheck:
    path: /api/up

registry:
  server: ghcr.io
  username: scarver2
  password:
    - GITHUB_TOKEN

servers:
  # db:
  #   - 45.76.237.124
  web:
    - 45.76.237.124

ssh:
  user: deploy

accessories:
  postgres:
    image: postgres:18.3
    host: 45.76.237.124
    port: "5432:5432"
    env:
      clear:
        POSTGRES_DB: ehr_api_production
        POSTGRES_USER: ehr_api
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data

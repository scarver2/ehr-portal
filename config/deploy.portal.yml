# config/deploy.portal.yml
service: ehr-portal

image: ghcr.io/scarver2/ehr-portal

builder:
  arch: amd64
  cache:
    type: registry
    options: mode=max

proxy:
  ssl: true
  host: ehr.stancarver.com
  app_port: 3000
  healthcheck:
    path: /api/up

registry:
  server: ghcr.io
  username: scarver2
  password:
    - GITHUB_TOKEN

servers:
  web:
    - 45.76.237.124

ssh:
  user: deploy

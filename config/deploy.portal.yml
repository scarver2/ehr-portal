# config/deploy.portal.yml
service: ehr-portal

image: ghcr.io/scarver2/ehr-portal

builder:
  remote: ssh://deploy@45.76.237.124
  arch: amd64
  context: .
  dockerfile: apps/ehr-portal/Dockerfile
  args:
    NEXT_PUBLIC_API_URL: https://api.ehr.stancarver.com

env:
  clear:
    NEXT_PUBLIC_API_URL: https://api.ehr.stancarver.com
  secret:
    - NEXT_PUBLIC_HONEYBADGER_API_KEY

registry:
  server: ghcr.io
  username: scarver2
  password:
    - GITHUB_TOKEN

proxy:
  ssl: true
  host: ehr.stancarver.com
  app_port: 3000
  healthcheck:
    path: /api/up

servers:
  web:
    - 45.76.237.124

ssh:
  user: deploy

